<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Reactzone</title>

    <link rel="icon" type="image/png" href="/src/assets/logo.png"/>
    <link rel="stylesheet" href="/src/assets/style.css"/>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  </head>

  <body>

    <nav class="navbar navbar-expand-lg bg-dark">
      <div class="container position-relative">
        <img class="navbar-brand" id="appLogo" src="/src/assets/logo.png" alt="Reactzone's Logo">
        <img class="position-absolute top-50 start-50 translate-middle" src="/src/assets/rabbitEars.png"  id="rabbitEars">
        <h3 class="navbar-text text-primary">Reactzone_</h3>
      </div>
    </nav>

    <div class="container">
      <!-- repeated tooth images -->
      <div id="toothContainer" class="d-flex flex-row justify-content-center"></div>

      <div id="root"></div>
    </div>

    <!-- repeated tooth rotated images -->
		<div id="toothRotateContainer" class="d-flex flex-row justify-content-center"></div>
    
    <footer class="bg-dark">
      <div class="container text-center p-3">
        <span class="text-primary ">Made with 💘 by R.Y.S</span>
      </div>
    </footer>
    
    <script type="module" src="/src/main.jsx"></script><!-- React JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script> <!-- Bootstrap JS-->
    <!-- Custom JS-->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Repeat image based on container's width
        function repeatImage(container, image) {
          if (!container || !image) return;
          
          const containerWidth = container.offsetWidth;
          const imageWidth = Math.round(parseFloat(getComputedStyle(image).width) || 0);
          if (!imageWidth) return; // TODO: Understand what this line do

          // Clear previous images to prevent duplication
          container.innerHTML = '';

          // Calculate number of images
          const numberOfImages = Math.ceil(containerWidth / imageWidth);

          // Append image to container
          for (let i = 0; i < numberOfImages - 1; i++) {
            const imgClone = image.cloneNode(true);
            imgClone.style.width = imageWidth + 'px';
            container.appendChild(imgClone);
          }
        }

        // Repeat tooth image
        const toothContainer = document.getElementById('toothContainer');
        const toothImage = document.createElement('img');
        toothImage.src = 'src/assets/tooth.png';
        toothImage.alt = 'Sharp Tooth Image';
        toothImage.style.width = '30px';
        toothContainer.appendChild(toothImage);

        const toothRotateContainer = document.getElementById('toothRotateContainer');
        const toothRotateImage = document.createElement('img');
        toothRotateImage.src = 'src/assets/toothRotated.png';
        toothRotateImage.alt = 'Sharp Tooth Image';
        toothRotateImage.style.width = '30px';
        toothRotateContainer.appendChild(toothRotateImage);

        // Wait for tooth image to load before applying repeatImage function
        toothImage.addEventListener('load', () => repeatImage(toothContainer, toothImage));
        toothRotateImage.addEventListener('load', () => repeatImage(toothRotateContainer, toothRotateImage));

        // Set tooth image repeat on window resize
        function tryRepeatImages() {
          repeatImage(toothContainer, toothImage);
          repeatImage(toothRotateContainer, toothRotateImage);
        }
        window.addEventListener('resize', tryRepeatImages);
      });
    </script>
  </body>
</html>
