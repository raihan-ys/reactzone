<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Reactzone</title>

    <link rel="icon" type="image/png" href="images/logo.png"/>
    <link rel="stylesheet" href="src/style.css"/>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jolly+Lodger&display=swap" rel="stylesheet">
  </head>

  <body class="bg-danger">

    <nav class="navbar navbar-expand-lg bg-dark">
      <div class="container position-relative p-3">
        <img class="nav-eye" src="images/eye.png" alt="Left Eye Image">
        <h1 class="position-absolute top-50 start-50 translate-middle navbar-text text-danger">R's Zone</h1>
        <img class="nav-eye" src="images/eyeRotated.png" alt="Right Eye Image">
      </div>
    </nav>
    <!-- repeated tooth images -->
    <div id="toothContainer" class="d-flex justify-content-center"></div>

    <div class="container bg-light mt-3 mb-3 p-4 rounded-3 border border-info border-5 border-start-0 rounded-end d-flex flex-column">
      <div id="root" class="mt-5 mb-5 flex-grow-1"></div>
      <span class="text-muted fw-bold">More games coming soon!</span>
    </div>

    <!-- repeated tooth rotated images -->
		<div id="toothRotateContainer" class="d-flex justify-content-center"></div>
    
    <footer class="bg-dark">
      <div class="container p-3 d-flex justify-content-center align-items-center gap-5">
        <!-- claw image -->
        <img src="images/claw.png" alt="Claw Image" style="width: 100px;">
        <span class="text-danger">Made with 💘 by R.Y.S - Ver. 1.0</span>
        <img src="images/clawRotated.png" alt="Claw Image" style="width: 100px;">
      </div>
    </footer>
    
    <script type="module" src="src/main.jsx"></script><!-- React JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script> <!-- Bootstrap JS-->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script> <!-- jQuery JS -->
    <!-- Custom JS-->
    <script>
     $(document).ready(function() {
        // Repeat image based on container's width
        function repeatImage(container, image) {
          // Get container's width (Convert jQuery object to raw DOM element for width calculation)
          const containerWidth = container[0].offsetWidth;
          // Get CSS-defined image's width
          const imageWidth = parseInt(image.css("width"));

          // Clear previous images to prevent duplication
          container.empty();

          // Calculate number of images
          const numberOfImages = Math.ceil(containerWidth / imageWidth);

          // Append image to container
          for (let i = 0; i < numberOfImages - 1; i++) {
            const imgClone = image.clone(true).css("width", imageWidth + "px");
            container.append(imgClone);
          }
        }

        // Repeat tooth image
        const toothContainer = $("#toothContainer");
        const toothImage = $("<img>", {
          src: "/images/tooth.png",
          alt: "Sharp Tooth Image",
          css: {
            width: "30px"
          }
        }).appendTo(toothContainer);

        const toothRotateContainer = $("#toothRotateContainer");
        const toothRotateImage = $("<img>", {
          src: "/images/toothRotated.png",
          alt: "Sharp Tooth Image",
          css: {
            width: "30px"
          }
        }).appendTo(toothRotateContainer);

        // Wait for tooth image to load before applying repeatImage function
        toothImage.on("load", function() {
          repeatImage(toothContainer, toothImage);
        });
        toothRotateImage.on("load", function() {
          repeatImage(toothRotateContainer, toothRotateImage);
        });

        // Set tooth image repeat on window resize
        $(window).resize(function() {
          repeatImage(toothContainer, toothImage);
          repeatImage(toothRotateContainer, toothRotateImage);
        });
      });
    </script>
  </body>
</html>
